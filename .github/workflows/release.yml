name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOCKER_IMAGE: "availj/avail-da-server"
  ADDR: "0.0.0.0"
  PORT: "8080"
  AVAIL_RPC: "http://localhost:9933"
  AVAIL_APPID: "0"
  AVAIL_TIMEOUT: "100"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Create empty .env file
        run: touch .env

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            ADDR=${{ env.ADDR }}
            PORT=${{ env.PORT }}
            AVAIL_RPC=${{ env.AVAIL_RPC }}
            AVAIL_APPID=${{ env.AVAIL_APPID }}
            AVAIL_TIMEOUT=${{ env.AVAIL_TIMEOUT }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.get_version.outputs.VERSION }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v1
        with:
          body: |
            Release ${{ steps.get_version.outputs.VERSION }}
            
            ## Docker Image
            
            ```bash
            # Latest version
            docker pull ${{ env.DOCKER_IMAGE }}:latest
            # Specific version
            docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.get_version.outputs.VERSION }}
            ```
            
            ## Running the container
            
            ```bash
            docker run -p 8080:8080 \
              -e ADDR=0.0.0.0 \
              -e PORT=8080 \
              -e AVAIL_RPC=http://your-rpc-endpoint:9933 \
              -e AVAIL_SEED=your-seed \
              -e AVAIL_APPID=0 \
              -e AVAIL_TIMEOUT=100 \
              ${{ env.DOCKER_IMAGE }}:latest
            ```
